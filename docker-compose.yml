services:
  humanwrite-api:
    build:
      context: ./humanwrite
      dockerfile: Dockerfile
    container_name: humanwrite-api
    ports:
      - "8000:8000"
    env_file:
      - ./humanwrite/.env.example
      - ./humanwrite/.env
    restart: unless-stopped

  humanwrite-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: humanwrite-web
    depends_on:
      - humanwrite-api
    ports:
      - "3000:3000"
    env_file:
      - .env.example
      - .env.local
    environment:
      PYTHON_SCORER_URL: "http://humanwrite-api:8000/api"
      APP_URL: "http://localhost:3000"
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
